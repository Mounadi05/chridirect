server {
    listen 80;
    server_name chridirect.store www.chridirect.store;
    return 301 https://chridirect.store$request_uri;
}

server {
    listen 443 ssl;
    server_name www.chridirect.store;
    ssl_certificate /etc/letsencrypt/live/chridirect.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chridirect.store/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    return 301 https://chridirect.store$request_uri;
}

server {
    listen 443 ssl;
    server_name chridirect.store;
    ssl_certificate /etc/letsencrypt/live/chridirect.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chridirect.store/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Serve uploaded images directly — bypass Next.js route cache
    location /uploads/ {
        alias /home/mounadi05/chridirect/store/public/uploads/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header X-Content-Type-Options nosniff;
    }

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 20M;
    }
}
